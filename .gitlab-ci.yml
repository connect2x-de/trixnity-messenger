stages:
  - build
  - tests
  - integration-tests
  - release

variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  GRADLE_USER_HOME: $CI_PROJECT_DIR/.gradle
  KONAN_DATA_DIR: $CI_PROJECT_DIR/.konan

.if-release: &if-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'

.docker-variables: &docker-variables
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "${DOCKER_TLS_CERTDIR}/client"

.build-cache: &build-cache
  paths:
    - $GRADLE_USER_HOME
    - $KONAN_DATA_DIR

.artifact-reports: &artifact-reports
  name: reports
  when: always
  paths: [ "**/build/reports" ]
  reports:
    junit: "**/build/test-results/**/TEST-*.xml"

build:
  stage: build
  tags: [ "internal-mac" ]
  variables: *docker-variables
  cache: *build-cache
  artifacts: *artifact-reports
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME'
  script:
    - ./gradlew :trixnity-messenger:assemble --stacktrace

tests:
  stage: tests
  tags: [ "internal-mac" ]
  variables: *docker-variables
  cache: *build-cache
  artifacts: *artifact-reports
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME'
  script:
    - ./gradlew -x :integrationtests:allTests allTests --stacktrace

integration-tests:
  stage: integration-tests
  tags: [ "internal-docker-privileged" ]
  image: eclipse-temurin:11
  services:
    - docker:20-dind
  variables: *docker-variables
  cache: *build-cache
  artifacts: *artifact-reports
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
    - if: '$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME'
  script:
    - ./gradlew :integrationtests:jvmTest --stacktrace

publish-trixnity-messenger:
  stage: release
  tags: [ "internal-mac" ]
  variables: *docker-variables
  cache: *build-cache
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
    - ./gradlew :trixnity-messenger:publish --stacktrace
