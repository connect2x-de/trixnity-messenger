workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - changelog
  - build
  - test
  - security
  - publish
  - kmmPublish

variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Xmx1g
  GRADLE_USER_HOME: $CI_PROJECT_DIR/.gradle
  KONAN_DATA_DIR: $CI_PROJECT_DIR/.konan
  KOTLIN_DATA_DIR: $CI_PROJECT_DIR/.kotlin
  BUILD_LINUX_IMAGE_NAME: registry.gitlab.com/trixnity/kmp-dockerfiles/kmp-dockerfiles-base:latest
  BUILD_LINUX_IMAGE_NAME_EMULATOR: registry.gitlab.com/trixnity/kmp-dockerfiles/kmp-dockerfiles-emulator:latest
  BUILD_LINUX_IMAGE_NAME_TRIVY: registry.gitlab.com/trixnity/kmp-dockerfiles/kmp-dockerfiles-trivy:latest
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fastest"
  CACHE_COMPRESSION_LEVEL: "fastest"

.cache: &cache
  - key:
      files:
        - gradle/wrapper/gradle-wrapper.properties
        - gradle/libs.versions.toml
    paths:
      - $GRADLE_USER_HOME/wrapper
      - $GRADLE_USER_HOME/nodejs
      - $GRADLE_USER_HOME/yarn
      - $GRADLE_USER_HOME/native
      - $KONAN_DATA_DIR
      - $KOTLIN_DATA_DIR

.artifact-reports: &artifact-reports
  name: reports
  when: always
  paths: [ "**/build/reports" ]
  reports:
    junit: "**/build/test-results/**/TEST-*.xml"
    coverage_report:
      coverage_format: jacoco
      path: trixnity-messenger/build/reports/kover/reportJvm.xml

.docker-variables: &docker-variables
  DIST_JAVA_HOME: /lib/jvm/temurin-24-jdk-amd64
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: "${DOCKER_TLS_CERTDIR}/client"

.if-merge-request: &if-merge-request
  - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME

.if-release: &if-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'

.if-dev-release: &if-dev-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'
    when: never
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: '$CI_COMMIT_BRANCH =~ /^v-\d+.\d+.\d+.*/'

build:mac:
  stage: build
  interruptible: true
  tags: [ "connect2x-mac" ]
  cache:
    - *cache
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      compileKotlin{IosArm64,IosSimulatorArm64,IosX64}
      compileTestKotlin{IosSimulatorArm64,IosX64}
      --stacktrace

build:linux:
  stage: build
  interruptible: true
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME
  cache:
    - *cache
  rules:
    - *if-merge-request
  variables:
    DIST_JAVA_HOME: /lib/jvm/temurin-24-jdk-amd64
  script:
    - ./gradlew
      compileKotlin{Jvm,Js}
      compileReleaseKotlinAndroid
      compileTestKotlin{Jvm,Js}
      compileReleaseUnitTestKotlinAndroid
      --stacktrace

test:mac:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "build:mac" ]
  tags: [ "connect2x-mac" ]
  cache:
    - *cache
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :trixnity-messenger:{iosSimulatorArm64,iosX64}Test
      --stacktrace

test:linux:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "build:linux" ]
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME
  cache:
    - *cache
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  variables:
    DIST_JAVA_HOME: /lib/jvm/temurin-24-jdk-amd64
  script:
    - ./gradlew
      :trixnity-messenger:{jvm,js}Test
      :trixnity-messenger:testCoverage
      --stacktrace
  coverage: '/Total test coverage.+ ([0-9]{1,3}%)/'

test:smoketest-desktop-linux:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "build:linux" ]
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME
  cache:
    - *cache
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  variables:
    DIST_JAVA_HOME: /lib/jvm/temurin-24-jdk-amd64
  script:
    - ./gradlew
      :trixnity-messenger-compose-view:desktopTest
      :trixnity-messenger-compose-view:testCoverage
      --stacktrace
  coverage: '/Total test coverage.+ ([0-9]{1,3}%)/'

test:smoketest-web:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "build:linux" ]
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME
  cache:
    - *cache
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  variables:
    DIST_JAVA_HOME: /lib/jvm/temurin-24-jdk-amd64
  script:
    - ./gradlew
      :trixnity-messenger-compose-view:jsBrowserFirefoxTest
      --stacktrace

test:smoketest-android:
  stage: test
  interruptible: true
  timeout: 15m
  needs: [ "build:linux" ]
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME_EMULATOR
  cache:
    - *cache
  artifacts:
    paths:
      - emulator.log
  rules:
    - *if-merge-request
  script:
    - ./scripts/start_emulator.sh
    - ./gradlew
      :trixnity-messenger-compose-view:connectedAndroidTest
      --stacktrace

test:integration-test:
  stage: test
  interruptible: true
  timeout: 30m
  needs: [ "build:linux" ]
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME
  services:
    - name: docker:dind
  cache:
    - *cache
  variables: *docker-variables
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :integrationtests:jvmTest
      --stacktrace

security:dependencies:
  stage: security
  interruptible: true
  timeout: 30m
  needs: [ ]
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME_TRIVY
  variables:
    TRIVY_CACHE_DIR: ".trivycache/"
    WITH_LOCK: true
  cache:
    - *cache
    - key:
        files:
          - gradle/wrapper/gradle-wrapper.properties
          - gradle/libs.versions.toml
      paths:
        - .trivycache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: true
    - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'
      allow_failure: false
    - if: $CI_PIPELINE_SOURCE == "schedule"
      allow_failure: false
  artifacts:
    when: always
    reports:
      dependency_scanning: report.json
  script:
    - ./gradlew dependenciesForAll --write-locks > dependencies.txt
    - trivy repo ./ --exit-code 0
    - trivy repo ./ --exit-code 0 --format template --template "@/usr/local/share/trivy/templates/gitlab.tpl" --output report.json
    - trivy repo ./ --exit-code 1 --severity CRITICAL

changelog:
  stage: changelog
  interruptible: true
  timeout: 5m
  tags: [ "saas-linux-small-amd64" ]
  rules:
    - *if-merge-request
  script:
    - git fetch origin main
    - |
      if git diff --name-only HEAD origin/main | grep "CHANGELOG.md"; then
        echo "CHANGELOG.md has changed"
      else
        echo "CHANGELOG.md has not changed"
        exit 1
      fi

publish:mac-dev:
  stage: publish
  tags: [ "connect2x-mac" ]
  cache:
    - *cache
  rules:
    - *if-dev-release
  script:
    - ./gradlew
      publish{IosArm64,IosSimulatorArm64,IosX64}PublicationToGitlabRepository
      --stacktrace

publish:linux-dev:
  stage: publish
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME
  cache:
    - *cache
  rules:
    - *if-dev-release
  variables:
    DIST_JAVA_HOME: /lib/jvm/temurin-24-jdk-amd64
  script:
    - ./gradlew
      publish{KotlinMultiplatform,Jvm,Js,AndroidRelease,Desktop,Web}PublicationToGitlabRepository
      --stacktrace

publish:mac:
  stage: publish
  tags: [ "connect2x-mac" ]
  cache:
    - *cache
  rules:
    - *if-release
  script:
    - ./gradlew
      publish{IosArm64,IosSimulatorArm64,IosX64}PublicationToGitlabRepository
      --stacktrace

publish:linux:
  stage: publish
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME
  cache:
    - *cache
  rules:
    - *if-release
  variables:
    DIST_JAVA_HOME: /lib/jvm/temurin-24-jdk-amd64
  script:
    - ./gradlew
      publish{KotlinMultiplatform,Jvm,Js,AndroidRelease,Desktop,Web}PublicationToGitlabRepository
      --stacktrace

staging:web:
  stage: publish
  tags: [ "connect2x-linux" ]
  image: $BUILD_LINUX_IMAGE_NAME
  cache:
    - *cache
  rules:
    - *if-merge-request
  needs: [ "build:linux" ]
  artifacts:
    name: web
    when: always
    paths:
      - public
    expire_in: 7d
  variables:
    DIST_JAVA_HOME: /lib/jvm/temurin-24-jdk-amd64
  script:
    - ./gradlew
      :trixnity-messenger-compose-app:webBrowserDistribution
      --stacktrace
    - mv trixnity-messenger-compose-app/build/dist/web/productionExecutable public
  environment:
    name: review/${CI_MERGE_REQUEST_IID}
    url: https://connect2x.gitlab.io/-/trixnity-messenger/trixnity-messenger/-/jobs/${CI_JOB_ID}/artifacts/public/index.html

kmmPublish:mac:
  stage: kmmPublish
  tags: [ "connect2x-mac" ]
  cache:
    - *cache
  rules:
    - *if-release
  timeout: 2h
  needs: [ "publish:mac" ]
  script:
    - ./kmmPublish.sh
