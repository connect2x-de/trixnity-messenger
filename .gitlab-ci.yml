workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - compile
  - check
  - test
  - staging
  - publish

variables:
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fastest"

.artifact-reports: &artifact-reports
  name: reports
  when: always
  paths: [ "**/build/reports", "**/build/**/yarn.lock", "**/build/kotlin/abi-legacy" ]
  reports:
    junit: "**/build/test-results/**/TEST-*.xml"
    coverage_report:
      coverage_format: jacoco
      path: trixnity-messenger/build/reports/kover/reportJvm.xml

.if-merge-request: &if-merge-request
  - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME

.if-release: &if-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+.*/'

.if-dev-release: &if-dev-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+2\.\d+.*/'
    when: never
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: '$CI_COMMIT_BRANCH =~ /^v-\d+\.\d+\.\d+.*/'

compile:ios:
  stage: compile
  interruptible: true
  tags: [ "connect2x-mac" ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      compileKotlin{IosArm64,IosSimulatorArm64}
      compileTestKotlinIosSimulatorArm64
      --stacktrace

compile:jvm-android-js:
  stage: compile
  interruptible: true
  tags: [ "connect2x-linux-shell" ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      compileKotlin{Jvm,Js,WasmJs}
      compileTestKotlin{Jvm,Js,WasmJs}
      compile{Debug,Release}KotlinAndroid
      compile{Debug,Release}UnitTestKotlinAndroid
      --stacktrace

check:formatting:
  stage: check
  interruptible: true
  tags: [ "connect2x-linux-shell-small" ]
  needs: [ ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew ktfmtCheck --stacktrace

# requires macOS since it can build/emulate all other targets
check:abi:
  stage: check
  interruptible: true
  timeout: 1h
  needs:
    - job: "compile:ios"
      artifacts: false
  tags: [ "connect2x-mac" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew internalDumpKotlinAbi --stacktrace
    - ./gradlew checkLegacyAbi --stacktrace

check:vulnerable-dependencies:
  stage: check
  interruptible: true
  timeout: 30m
  needs: [ ]
  tags: [ "connect2x-linux-shell-small" ]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: true
    - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'
      allow_failure: false
    - if: $CI_PIPELINE_SOURCE == "schedule"
      allow_failure: false
  variables:
    WITH_LOCK: true
  artifacts:
    when: always
    reports:
      dependency_scanning: report.json
  script:
    - ./gradlew dependenciesForAll --write-locks > dependencies.txt
    - trivy repo ./ --exit-code 0 --ignorefile .trivyignore.yaml
    - trivy repo ./ --exit-code 0 --ignorefile .trivyignore.yaml --format template --template "@/usr/local/share/trivy/templates/gitlab.tpl" --output report.json
    - trivy repo ./ --exit-code 1 --ignorefile .trivyignore.yaml --severity CRITICAL

check:changelog:
  stage: check
  interruptible: true
  needs: [ ]
  timeout: 5m
  tags: [ "connect2x-linux-shell-small" ]
  rules:
    - *if-merge-request
  script:
    - git fetch origin main
    - |
      if git diff --name-only HEAD origin/main | grep "CHANGELOG.md"; then
        echo "CHANGELOG.md has changed"
      else
        echo "CHANGELOG.md has not changed"
        exit 1
      fi

test:sdk:unit:ios:
  stage: test
  interruptible: true
  timeout: 1h
  needs:
    - job: "compile:ios"
      artifacts: false
  tags: [ "saas-macos-medium-m1" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew :trixnity-messenger:iosSimulatorArm64Test --stacktrace

test:sdk:unit:jvm:
  stage: test
  interruptible: true
  timeout: 1h
  needs:
    - job: "compile:jvm-android-js"
      artifacts: false
  tags: [ "connect2x-linux-shell-small" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :trixnity-messenger:jvmTest
      :trixnity-messenger:testCoverage
      --stacktrace
  coverage: '/Total test coverage.+ ([0-9]{1,3}%)/'

test:sdk:unit:js:
  stage: test
  interruptible: true
  timeout: 1h
  needs:
    - job: "compile:jvm-android-js"
      artifacts: false
  tags: [ "connect2x-linux-shell-small" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :trixnity-messenger:{js,wasmJs}Test
      --stacktrace

test:sdk:integration:jvm:
  stage: test
  interruptible: true
  timeout: 30m
  needs:
    - job: "compile:jvm-android-js"
      artifacts: false
  tags: [ "connect2x-linux-shell-small" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :integrationtests:jvmTest
      --stacktrace

test:ui:integration:android:
  stage: test
  interruptible: true
  timeout: 1h
  needs:
    - job: "compile:jvm-android-js"
      artifacts: false
  tags: [ "connect2x-linux-shell-small" ]
  artifacts:
    when: always
    paths: [ "**/screenshots", "**/build/reports", "**/managed_device_android_test_additional_output" ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :trixnity-messenger-compose-view:emulatorDebugAndroidTest
      --stacktrace

test:ui:integration:jvm:
  stage: test
  interruptible: true
  timeout: 1h
  needs:
    - job: "compile:jvm-android-js"
      artifacts: false
  tags: [ "connect2x-linux-shell-small" ]
  artifacts:
    when: always
    paths: [ "**/screenshots", "**/build/reports" ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :trixnity-messenger-compose-view:jvmTest
      --stacktrace

test:ui:integration:js:
  stage: test
  interruptible: true
  timeout: 1h
  needs:
    - job: "compile:jvm-android-js"
      artifacts: false
  tags: [ "connect2x-linux-shell-small" ]
  artifacts:
    when: always
    paths: [ "**/screenshots", "**/build/reports" ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew
      :trixnity-messenger-compose-view:{jsBrowser,wasmJsBrowser}Test
      --stacktrace

staging:android:
  stage: staging
  interruptible: true
  tags: [ "connect2x-linux-shell" ]
  rules:
    - *if-merge-request
  needs: [ "compile:jvm-android-js" ]
  script:
    - ./gradlew
      :trixnity-messenger-compose-app:assembleRelease
      --stacktrace
  artifacts:
    paths:
      - trixnity-messenger-compose-app/build/outputs/apk/release/trixnity-messenger-compose-app-release.apk
    expire_in: 7d
    expose_as: 'Android App APK'

staging:web:
  stage: staging
  interruptible: true
  tags: [ "connect2x-linux-shell" ]
  rules:
    - *if-merge-request
  needs: [ "compile:jvm-android-js" ]
  artifacts:
    name: web
    when: always
    paths:
      - public
    expire_in: 7d
  script:
    - ./gradlew
      :trixnity-messenger-compose-app:jsBrowserDistribution
      --stacktrace
    - mv trixnity-messenger-compose-app/build/dist/js/productionExecutable public
  environment:
    name: review/${CI_MERGE_REQUEST_IID}
    url: https://connect2x.gitlab.io/-/trixnity-messenger/trixnity-messenger/-/jobs/${CI_JOB_ID}/artifacts/public/index.html

publish:mac-dev:
  stage: publish
  tags: [ "connect2x-mac" ]
  rules:
    - *if-dev-release
  script:
    - ./gradlew
      publish{IosArm64,IosSimulatorArm64}PublicationToGitlabRepository
      --stacktrace

publish:linux-dev:
  stage: publish
  tags: [ "connect2x-linux-shell" ]
  rules:
    - *if-dev-release
  script:
    - ./gradlew
      publish{KotlinMultiplatform,Jvm,Js,WasmJs,AndroidRelease}PublicationToGitlabRepository
      --stacktrace

publish:release:
  stage: publish
  tags: [ "connect2x-mac" ]
  timeout: 2h
  rules:
    - *if-release
  script:
    - ./gradlew
      publishAllPublicationsToGitLabRepository
      publishAndReleaseToMavenCentral
      --stacktrace

publish:kmm:
  stage: publish
  tags: [ "connect2x-mac" ]
  rules:
    - *if-release
  timeout: 2h
  needs: [ "publish:release" ]
  script:
    - ./kmmPublish.sh
